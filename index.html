<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cagnotte pour Ghali Seddouki</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>

<h1>🎉 Cagnotte pour Ghali Seddouki</h1>

<p>
Aidons Ghali à réaliser son rêve !
</p>

</header>

<section class="hero">

<div class="money">

<h2 id="total">0 DH</h2>

<p>Collectés</p>

</div>

<div class="goal">

Objectif : <b>10 000 DH</b>

</div>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<div class="stats">

<div>

<h3 id="people">0</h3>

<p>Participants</p>

</div>

<div>

<h3 id="percent">0%</h3>

<p>Objectif atteint</p>

</div>

</div>

</section>

<section class="form">

<h2>Faire une contribution</h2>

<input
type="text"
id="name"
placeholder="Votre prénom">

<input
type="number"
id="amount"
placeholder="Montant en DH">

<button id="add">

Contribuer

</button>

</section>

<section class="history">

<h2>Dernières contributions</h2>

<div id="history">

<p>Aucune contribution.</p>

</div>

</section>

<footer>

Créé uniquement à titre fictif.

</footer>

<script src="script.js"></script>

</body>
</html>
